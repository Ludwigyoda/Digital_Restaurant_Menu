<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diagnostic kiosk — La Lupita</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 1.2rem; background: #1a1a1a; color: #eee; }
      h1 { font-size: 1.2rem; }
      .ua { font-size: .8rem; word-break: break-all; background: #000; padding: .6rem; border-radius: .5rem; }
      .big { font-size: 1.6rem; font-weight: 700; margin: .8rem 0; }
      table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: .95rem; }
      td { padding: .5rem .4rem; border-bottom: 1px solid #333; }
      .ok { color: #4ade80; font-weight: 700; }
      .no { color: #f87171; font-weight: 700; }
      .verdict { margin-top: 1.2rem; padding: 1rem; border-radius: .6rem; font-size: 1.05rem; }
      .verdict.good { background: #052e16; border: 1px solid #4ade80; }
      .verdict.bad { background: #3b0a0a; border: 1px solid #f87171; }
    </style>
  </head>
  <body>
    <h1>Diagnostic du kiosk</h1>
    <div class="big" id="chrome">Chrome : …</div>
    <div class="ua" id="ua"></div>
    <table id="feat"></table>
    <div id="verdict"></div>

    <script>
      var ua = navigator.userAgent;
      document.getElementById("ua").textContent = ua;
      var m = ua.match(/Chrome\/(\d+)/);
      var chromeV = m ? parseInt(m[1], 10) : 0;
      document.getElementById("chrome").textContent =
        "Chrome / WebView : " + (chromeV ? chromeV : "inconnu");

      function sup(desc, ok) { return { desc: desc, ok: ok }; }
      var tests = [
        sup("oklch() — couleurs Tailwind v4", CSS.supports("color", "oklch(0.6 0.1 30)")),
        sup("color-mix() — Tailwind v4", CSS.supports("color", "color-mix(in srgb, red, blue)")),
        sup("@property (registerProperty)", "registerProperty" in CSS),
        sup("backdrop-filter (flou du bouton +)", CSS.supports("backdrop-filter", "blur(4px)")),
        sup(":has() selector", (function () { try { return CSS.supports("selector(:has(*))"); } catch (e) { return false; } })()),
        sup("container queries", CSS.supports("container-type", "inline-size")),
        sup("aspect-ratio", CSS.supports("aspect-ratio", "1/1")),
      ];
      var t = document.getElementById("feat");
      tests.forEach(function (x) {
        var tr = document.createElement("tr");
        tr.innerHTML = "<td>" + x.desc + "</td><td class='" + (x.ok ? "ok'>✅ OUI" : "no'>❌ NON") + "</td>";
        t.appendChild(tr);
      });

      var tailwindOK = tests[0].ok && tests[1].ok && tests[2].ok;
      var v = document.getElementById("verdict");
      if (tailwindOK) {
        v.className = "verdict good";
        v.innerHTML = "✅ <b>Moteur compatible.</b> Le code actuel (Tailwind v4) devrait s'afficher correctement. Il suffit d'optimiser les images.";
      } else {
        v.className = "verdict bad";
        v.innerHTML = "❌ <b>Moteur trop ancien pour Tailwind v4.</b> Il faut une version adaptée (fallbacks CSS + plugin-legacy). Chrome détecté : " + (chromeV || "?") + " — il faut ≥ 111.";
      }
    </script>
  </body>
</html>
